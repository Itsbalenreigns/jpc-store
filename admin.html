<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | JPCStore - Manage Products</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            margin-top: 100px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--primary);
        }

        .admin-header h1 {
            font-size: 2rem;
            color: var(--text-main);
        }

        .admin-header a {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .admin-header a:hover {
            transform: scale(1.05);
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .form-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--glass);
        }

        .form-section h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--glass-strong);
            border: 1px solid var(--glass);
            border-radius: 8px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        .products-list-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--glass);
        }

        .products-list-section h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        .product-table {
            width: 100%;
            border-collapse: collapse;
        }

        .product-table th {
            background: var(--glass-strong);
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 2px solid var(--glass);
        }

        .product-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--glass);
            color: var(--text-dim);
        }

        .product-table tr:hover {
            background: var(--glass-strong);
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .btn-delete:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .btn-edit {
            background: #f59e0b;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .btn-edit:hover {
            background: #d97706;
            transform: scale(1.05);
        }

        .empty-message {
            text-align: center;
            padding: 2rem;
            color: var(--text-dimmer);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }

            .product-table {
                font-size: 0.85rem;
            }

            .product-table th,
            .product-table td {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- Admin Header -->
    <header id="navbar">
        <div class="nav-container">
            <div class="logo">JPC<span>STORE</span></div>
            <nav class="nav-links">
                <a href="index.html">← Back to Store</a>
            </nav>
        </div>
    </header>

    <!-- Main Admin Content -->
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-cogs"></i> Admin Panel</h1>
            <a href="index.html">View Store</a>
        </div>

        <div class="admin-grid">
            <!-- Add Product Form -->
            <div class="form-section">
                <h2>Add New Product</h2>
                <form id="addProductForm">
                    <div class="form-group">
                        <label for="productId">Product ID *</label>
                        <input type="number" id="productId" required placeholder="e.g., 1001">
                    </div>

                    <div class="form-group">
                        <label for="productCode">Product Code *</label>
                        <input type="text" id="productCode" required placeholder="e.g., MBPRO-M3-001">
                    </div>

                    <div class="form-group">
                        <label for="productName">Product Name *</label>
                        <input type="text" id="productName" required placeholder="e.g., MacBook Pro M3 Max">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="productPrice">Price ($) *</label>
                            <input type="number" id="productPrice" required min="0" step="0.01" placeholder="e.g., 2499">
                        </div>

                        <div class="form-group">
                            <label for="productCategory">Category *</label>
                            <select id="productCategory" required>
                                <option value="">Select Category</option>
                                <option value="laptop">Laptop</option>
                                <option value="desktop">Desktop</option>
                                <option value="accessory">Accessory</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="productImage">Image URL *</label>
                        <input type="url" id="productImage" required placeholder="https://images.unsplash.com/...">
                    </div>

                    <button type="submit" class="btn-submit">
                        <i class="fas fa-plus"></i> Add Product
                    </button>
                </form>
            </div>

            <!-- Products List -->
            <div class="products-list-section">
                <h2>Products Inventory</h2>
                <div id="productsTableContainer">
                    <div class="empty-message">
                        <i class="fas fa-inbox" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                        <p>No products added yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px;"></div>

    <script>
        // Get products from localStorage or use defaults
        let adminProducts = JSON.parse(localStorage.getItem('TECH_PRODUCTS')) || [];

        // Form handler
        document.getElementById('addProductForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const newProduct = {
                id: parseInt(document.getElementById('productId').value),
                code: document.getElementById('productCode').value,
                name: document.getElementById('productName').value,
                price: parseFloat(document.getElementById('productPrice').value),
                category: document.getElementById('productCategory').value,
                img: document.getElementById('productImage').value
            };

            // Check if ID already exists
            if (adminProducts.some(p => p.id === newProduct.id)) {
                showToast('Product ID already exists!', 'error');
                return;
            }

            // Add product
            adminProducts.push(newProduct);
            localStorage.setItem('TECH_PRODUCTS', JSON.stringify(adminProducts));

            // Reset form
            document.getElementById('addProductForm').reset();

            // Update UI
            renderProductsTable();
            showToast('Product added successfully!', 'success');
        });

        // Render products table
        function renderProductsTable() {
            const container = document.getElementById('productsTableContainer');

            if (adminProducts.length === 0) {
                container.innerHTML = `
                    <div class="empty-message">
                        <i class="fas fa-inbox" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                        <p>No products added yet</p>
                    </div>
                `;
                return;
            }

            const table = `
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Category</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${adminProducts.map(p => `
                            <tr>
                                <td>${p.id}</td>
                                <td>${p.code}</td>
                                <td>${p.name}</td>
                                <td>$${p.price.toLocaleString()}</td>
                                <td><span style="background: var(--glass); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem;">${p.category}</span></td>
                                <td>
                                    <div class="product-actions">
                                        <button class="btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = table;
        }

        // Delete product
        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                adminProducts = adminProducts.filter(p => p.id !== id);
                localStorage.setItem('TECH_PRODUCTS', JSON.stringify(adminProducts));
                renderProductsTable();
                showToast('Product deleted!', 'success');
            }
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideOut 0.4s ease';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // Initial render
        renderProductsTable();

        // Smooth loader fade
        setTimeout(() => {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
        }, 800);
    </script>
</body>
</html>
